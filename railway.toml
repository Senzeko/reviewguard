# Railway — https://docs.railway.com/guides/config-as-code
# Set variables in the Railway dashboard: DATABASE_URL, REDIS_URL, ENCRYPTION_KEY,
# ANTHROPIC_API_KEY, APP_URL (https://your-service.up.railway.app or custom domain), etc.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /health also returns 200 while deps warm up (see health.ts); live is minimal
healthcheckPath = "/health/live"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
