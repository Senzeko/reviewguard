name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: cd client && npm ci
      - run: npx tsc --noEmit
      - run: cd client && npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/reviewguard_test
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && secrets.ANTHROPIC_API_KEY || 'sk-ant-api03-ci-placeholder-not-for-production-use' }}
      GOOGLE_PLACES_API_KEY: test-key
      SQUARE_APPLICATION_ID: test-id
      SQUARE_APPLICATION_SECRET: test-secret
      CLOVER_APP_ID: test-id
      CLOVER_APP_SECRET: test-secret
      NODE_ENV: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: reviewguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx drizzle-kit migrate
      - run: npx vitest run

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/reviewguard_test
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && secrets.ANTHROPIC_API_KEY || 'sk-ant-api03-ci-placeholder-not-for-production-use' }}
      GOOGLE_PLACES_API_KEY: test-key
      SQUARE_APPLICATION_ID: test-id
      SQUARE_APPLICATION_SECRET: test-secret
      CLOVER_APP_ID: test-id
      CLOVER_APP_SECRET: test-secret
      NODE_ENV: test
      PORT: 3000
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: reviewguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: cd client && npm ci
      - run: npx drizzle-kit migrate
      - run: npx playwright install --with-deps chromium
      - name: Start API (background)
        run: npx tsx src/index.ts &
        env:
          EVIDENCE_VAULT_PATH: ./evidence_vault
          MEDIA_VAULT_PATH: ./media_vault
      - name: Wait for /health/live
        run: |
          for i in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:3000/health/live" >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for API"
          exit 1
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t reviewguard-ai:test .
      - run: docker image inspect reviewguard-ai:test --format='Size={{.Size}}'
